        async function renderHomeSplash() {
            try {
                // 1. Carica i JSON di configurazione
                const layouts = await fetch('layouts.json').then(r => r.json());
                const splash = await fetch('splashpage.json').then(r => r.json());

                const container = document.getElementById('homeSplash');
                if (!container) return;

                // 2. Reset contenuto splash
                container.innerHTML = '';

                // 3. Loop sulle sezioni verticali della home
                splash.sections.forEach(section => {
                const layoutDef = layouts[section.layout];
                if (!layoutDef) {
                    console.warn(`Layout "${section.layout}" non trovato`);
                    return;
                }

                // Sezione splash (una griglia)
                const sectionEl = document.createElement('div');
                sectionEl.className = 'splash-section';
                sectionEl.style.height = layoutDef.height;
                sectionEl.style.gridTemplateColumns = `repeat(${layoutDef.columns}, 1fr)`;

                // 4. Loop sui riquadri del layout
                layoutDef.slots.forEach((slot, index) => {
                    const imgData = section.images[index];
                    if (!imgData) return;

                    // Supporto stringa / oggetto
                    const imgSrc =
                    typeof imgData === 'string' ? imgData : imgData.src;
                    const imgText =
                    typeof imgData === 'object' && imgData.text ? imgData.text : null;
                    const projectName =
                    typeof imgData === 'object' && imgData.project_name
                        ? imgData.project_name
                        : null;

                    // Riquadro
                    const item = document.createElement('div');
                    item.className = 'splash-item';
                    item.style.gridColumn = slot.col;
                    if (slot.row) item.style.gridRow = slot.row;

                    // Immagine
                    const img = document.createElement('img');
                    img.src = imgSrc;
                    img.loading = 'lazy';
                    img.alt = imgText || '';

                    item.appendChild(img);

                    // Overlay testuale (opzionale)
                    if (imgText) {
                    const overlay = document.createElement('div');
                    overlay.className = 'splash-overlay';
                    overlay.textContent = imgText;
                    item.appendChild(overlay);
                    }

                    // Click → progetto (opzionale)
                    if (projectName) {
                    const projectId = findProjectIdByName(projectName);
                    if (projectId) {
                        item.style.cursor = 'pointer';
                        item.addEventListener('click', () => {
                        showProjectsSection(false);
                        showProject(projectId);
                        });
                    } else {
                        console.warn(`Progetto "${projectName}" non trovato`);
                    }
                    }

                    sectionEl.appendChild(item);
                });

                container.appendChild(sectionEl);
                });

            } catch (err) {
                console.error('Errore in renderHomeSplash:', err);
            }
        }

        
        function findProjectIdByName(projectName) {
            const project = allProjectsFlattened.find(p =>
                p.categoryPath.split('.').pop() === projectName
            );
            return project ? project.id : null;
        }


        // ==========================================
        // GESTIONE CRONOLOGIA E TASTO "INDIETRO"
        // ==========================================

        // 1. Funzione per salvare lo stato nel browser
        function saveState(view, projectId = null, filter = null) {
            const currentState = history.state;
            
            // Evita di salvare lo stesso stato due volte di fila
            if (currentState && currentState.view === view && currentState.projectId === projectId && currentState.filter === filter) {
                return;
            }

            const stateObj = { view: view, projectId: projectId, filter: filter };
            
            // Creiamo un URL finto ma parlante (es. ?view=projects&filter=design)
            let url = `?view=${view}`;
            if (projectId) url += `&id=${projectId}`;
            if (filter) url += `&filter=${filter}`;

            // Scrive nella cronologia del browser
            history.pushState(stateObj, '', url);
        }

        // 2. Il "Listener" che scatta quando premi il tasto INDIETRO o AVANTI del browser
        window.addEventListener('popstate', function(event) {
            const state = event.state;
            
            if (!state) {
                showProjectsSection(false, false); // Ritorna alla home di base
                return;
            }

            // Il "false, false" serve a NON far scattare un nuovo salvataggio mentre andiamo indietro!
            switch (state.view) {
                case 'home': 
                    showHome(false, false); 
                    break;
                case 'about': 
                    showAbout(false, false); 
                    break;
                case 'contact': 
                    showContact(false, false); 
                    break;
                case 'projects': 
                    showProjectsSection(false, false);
                    // Passiamo 'false' anche qui per non far riscrivere la cronologia!
                    if (state.filter) filterProjects(state.filter, 0.2, 250, 0.8, 0, false); 
                    break;
                case 'projectDetail': 
                    if (state.projectId) showProject(state.projectId, false, false);
                    break;
            }
        });


    </script>
